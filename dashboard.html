<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FM Logistics Operations Portal</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,sans-serif;
}

.logo{
text-align:center;
margin-bottom:40px;
}

.company-logo{
width:140px;
height:auto;
display:block;
margin:0 auto 10px;
padding:10px;
background:white;
border-radius:12px;
box-shadow:0 2px 8px rgba(0,0,0,.15);
}
  
.logo-circle{
width:90px;
height:90px;
margin:0 auto 15px;
background:white;
color:#002b7f;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:36px;
font-weight:bold;
}

body{
background:#f4f6f9;
display:flex;
}

.sidebar{
width:250px;
height:100vh;
background:#002b7f;
color:white;
padding:25px;
position:fixed;
}

.logo{
margin-bottom:40px;
}

.logo h2{
font-size:32px;
}

.logo p{
opacity:.8;
}

.sidebar ul{
list-style:none;
margin-top:30px;
}

.sidebar li{
padding:15px;
margin-bottom:8px;
cursor:pointer;
border-radius:8px;
}

.sidebar li:hover{
background:#0046d5;
}

.main{
margin-left:250px;
width:100%;
padding:30px;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:30px;
}

.profile{
background:white;
padding:12px 20px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,.1);
}

.cards{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
margin-bottom:30px;
}

.card{
background:white;
padding:25px;
border-radius:12px;
box-shadow:0 2px 8px rgba(0,0,0,.08);
}

.card h3{
color:#666;
margin-bottom:10px;
}

.card h1{
font-size:38px;
}

.content{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
margin-bottom:30px;
}

.panel{
background:white;
padding:25px;
border-radius:12px;
box-shadow:0 2px 8px rgba(0,0,0,.08);
}

.status-item{
margin:12px 0;
font-size:18px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:15px;
}

th,td{
padding:12px;
border-bottom:1px solid #ddd;
text-align:left;
}

.quick-actions{
background:white;
padding:25px;
border-radius:12px;
box-shadow:0 2px 8px rgba(0,0,0,.08);
}

.action-grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:15px;
margin-top:20px;
}

.action-card{
background:#eef3ff;
padding:25px;
text-align:center;
border-radius:12px;
cursor:pointer;
font-weight:600;
}

.action-card:hover{
background:#dce7ff;
}
.pending{
background:#fff3cd;
color:#856404;
padding:6px 12px;
border-radius:20px;
font-size:13px;
font-weight:600;
}

.approved{
background:#d4edda;
color:#155724;
padding:6px 12px;
border-radius:20px;
font-size:13px;
font-weight:600;
}

/* ===== Notification ===== */

.notification-wrapper{
position:relative;
}

.notification-bell{
position:relative;
background:white;
border:none;
width:55px;
height:55px;
border-radius:50%;
cursor:pointer;
font-size:22px;
box-shadow:0 8px 20px rgba(0,0,0,.12);
}

.badge{
position:absolute;
top:-5px;
right:-5px;
width:22px;
height:22px;
border-radius:50%;
background:red;
color:white;
font-size:11px;
display:flex;
align-items:center;
justify-content:center;
}

.notification-dropdown{
display:none;
position:absolute;
right:0;
top:70px;
width:320px;
background:white;
padding:15px;
border-radius:12px;
box-shadow:0 10px 30px rgba(0,0,0,.15);
z-index:999;
}

.notification-panel{
display:flex;
gap:15px;
margin-bottom:25px;
}

.notice{
background:white;
padding:12px 18px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,.08);
font-weight:600;
}

.card:hover,
.panel:hover,
.action-card:hover{
transform:translateY(-5px);
transition:.3s;
}

</style>

</head>

<body>

<div class="sidebar">

<div class="logo">

<img src="LOGO.jpg" class="company-logo">
  
<h2 style="font-size:18px;margin-top:10px;">
Nidhi Gajjar
</h2>

<p style="font-size:13px;opacity:0.8;">
reception@fmlogistic.com
</p>

</div>

<ul>
<li onclick="window.location.href='dashboard.html'">Dashboard</li>

<li onclick="window.location.href='invoice.html'">Invoice Management</li>

<li onclick="window.location.href='visitor.html'">Visitor Management</li>

<li onclick="window.location.href='travel.html'">Travel Requests</li>

<li onclick="window.location.href='hotel.html'">Hotel Bookings</li>

<li onclick="window.location.href='reports.html'">Reports</li>

<li onclick="window.location.href='settings.html'">Settings</li>
</ul>

</div>

<div class="main">

PASTE DASHBOARD V2 HERE

</div>
  
</body>
</html>
