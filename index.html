<!DOCTYPE html>
<html>
<head>
    <title>FM Logistics Portal</title>

    <style>
        body{
            font-family:Arial,sans-serif;
            background:#f4f6f9;
            margin:0;
            padding:0;
        }

        .header{
            background:#0066cc;
            color:white;
            padding:20px;
            text-align:center;
        }

        .container{
            padding:30px;
        }

        .card{
            background:white;
            padding:20px;
            border-radius:10px;
            box-shadow:0 2px 8px rgba(0,0,0,0.1);
            margin-bottom:20px;
        }

        button{
            background:#0066cc;
            color:white;
            border:none;
            padding:10px 20px;
            border-radius:5px;
            cursor:pointer;
        }
    </style>
</head>

<body>

<div class="header">
    <h1>FM Logistics Operations Portal</h1>
</div>

<div class="container">

    <div class="card">
        <h2>Invoice Management</h2>
        <p>Submit and track invoices.</p>
        <button>Open Module</button>
    </div>

    <div class="card">
        <h2>Visitor Management</h2>
        <p>Manage visitor requests and approvals.</p>
        <button>Open Module</button>
    </div>

    <div class="card">
        <h2>Travel Requests</h2>
        <p>Manage employee travel bookings.</p>
        <button>Open Module</button>
    </div>

</div>

</body>
</html>
