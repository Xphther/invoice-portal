<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Travel Request</title>

<style>

:root{
--red:#ef2b2d;
--blue:#002b7f;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
min-height:100vh;
padding:40px;
background:
radial-gradient(circle at top left,rgba(239,43,45,.12),transparent 30%),
radial-gradient(circle at top right,rgba(0,43,127,.12),transparent 30%),
linear-gradient(135deg,#f8fbff,#ffffff);
}

.container{
max-width:1400px;
margin:auto;
background:rgba(255,255,255,.85);
backdrop-filter:blur(15px);
padding:35px;
border-radius:18px;
box-shadow:0 20px 50px rgba(0,0,0,.08);
}
.header-section{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:30px;
}

.request-id{
background:#eef4ff;
color:#002b7f;
padding:10px 18px;
border-radius:10px;
font-weight:600;
}

h1{
color:var(--blue);
margin-bottom:10px;
}

.subtitle{
color:#666;
margin-bottom:30px;
}

.form-grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
}

.field{
margin-bottom:18px;
}

label{
display:block;
margin-bottom:8px;
font-size:13px;
font-weight:600;
color:#555;
}

input,
select,
textarea{
width:100%;
padding:12px;
border:1px solid #d9d9d9;
border-radius:10px;
font-size:14px;
}

textarea{
height:120px;
resize:none;
}

.full{
grid-column:1 / -1;
}

.submit-btn{
margin-top:20px;
background:var(--blue);
color:white;
border:none;
padding:14px 25px;
border-radius:10px;
font-size:15px;
font-weight:600;
cursor:pointer;
}

.submit-btn:hover{
background:#0040ba;
}

</style>
</head>

<body>

<div class="container">

<div class="header-section">

<div>
<h1>Travel Request Portal</h1>
<p class="subtitle">
Submit employee travel requests for approval and booking.
</p>
</div>

<div class="request-id">
Request ID : TRV-2026-001
</div>

</div>

<div class="form-grid">

<div class="field">
<label>Employee Name *</label>
<input type="text" required>
</div>

<div class="field">
<label>Employee ID *</label>
<input type="text" required>
</div>

<div class="field">
<label>Location *</label>
<select required>
<option value="">Select Location</option>
<option>Mumbai</option>
<option>Pune</option>
<option>Delhi</option>
<option>Bangalore</option>
<option>Chennai</option>
<option>Hyderabad</option>
</select>
</div>

<div class="field">
<label>Department *</label>
<input type="text" required>
</div>

<div class="field">
<label>Cost Center *</label>
<select required>
<option value="">Select Cost Center</option>
<option>CC1001 - Operations</option>
<option>CC1002 - Transport</option>
<option>CC1003 - Warehouse</option>
<option>CC1004 - Corporate</option>
</select>
</div>

<div class="field">
<label>Reporting Manager *</label>
<input type="text" required>
</div>

<div class="field">
<label>Customer Name *</label>
<input type="text" required>
</div>

<div class="field">
<label>Reporting Customer Number *</label>
<input type="text" placeholder="123456626" required>
</div>

<div class="field">
<label>Travel Type *</label>
<select required>
<option value="">Select Travel Type</option>
<option>Flight</option>
<option>Train</option>
<option>Cab</option>
</select>
</div>

<div class="field">
<label>From Location *</label>
<input type="text" required>
</div>

<div class="field">
<label>To Location *</label>
<input type="text" required>
</div>

<div class="field">
<label>Departure Date *</label>
<input type="date" required>
</div>

<div class="field">
<label>Return Date *</label>
<input type="date" required>
</div>

<div class="field">
<label>Estimated Travel Cost (₹) *</label>
<input type="number" required>
</div>

<div class="field">
<label>Travel Advance Required *</label>
<select required>
<option value="">Select</option>
<option>Yes</option>
<option>No</option>
</select>
</div>

<div class="field">
<label>Advance Amount (₹) *</label>
<input
type="number"
placeholder="Enter Advance Amount"
min="0">
</div>
  
<div class="field">
<label>Mode Preference *</label>
<select required>
<option value="">Select</option>
<option>Economy</option>
<option>Premium Economy</option>
<option>Business Class</option>
</select>
</div>

<div class="field full">
<label>Business Purpose / Travel Justification *</label>
<textarea required></textarea>
</div>

<div class="field full">
<label>Upload Approval Document *</label>
<input type="file" required>
</div>

</div>

<button class="submit-btn">
Submit For Approval
</button>

</div>

</body>
</html>
