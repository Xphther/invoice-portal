<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Travel Request</title><style>:root{--red:#ef2b2d;--blue:#002b7f;}*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif;}body{min-height:100vh;padding:40px;overflow-x:hidden;background:linear-gradient(-45deg,#f8fbff,#eef4ff,#ffffff,#f5f8ff);background-size:400% 400%;animation:bgMove 15s ease infinite;position:relative;}@keyframes bgMove{0%{background-position:0% 50%;}50%{background-position:100% 50%;}100%{background-position:0% 50%;}}.bg-shape{position:fixed;border-radius:50%;filter:blur(80px);opacity:.25;z-index:-1;animation:float 12s infinite ease-in-out}.shape1{width:300px;height:300px;background:#ef2b2d;top:-80px;left:-80px}.shape2{width:350px;height:350px;background:#002b7f;bottom:-120px;right:-120px;animation-delay:2s}.shape3{width:250px;height:250px;background:#4d7cff;top:40%;left:60%;animation-delay:4s}@keyframes float{0%{transform:translateY(0) translateX(0)}50%{transform:translateY(-40px) translateX(30px)}100%{transform:translateY(0) translateX(0)}}.container{max-width:1400px;margin:auto;background:rgba(255,255,255,.75);backdrop-filter:blur(20px);padding:35px;border-radius:22px;border:1px solid rgba(255,255,255,.4);box-shadow:0 20px 60px rgba(0,0,0,.08),0 8px 25px rgba(0,43,127,.08)}.header-section{display:flex;justify-content:space-between;align-items:center;margin-bottom:30px}.request-id{background:#eef4ff;color:#002b7f;padding:10px 18px;border-radius:10px;font-weight:600}h1{color:var(--blue)}.subtitle{color:#666;margin-top:8px}.form-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-top:25px}.field{margin-bottom:18px;transition:.3s}.field:hover{transform:translateY(-3px)}label{display:block;margin-bottom:8px;font-size:13px;font-weight:600;color:#555}input,select,textarea{width:100%;padding:12px;border:1px solid #d9d9d9;border-radius:10px;font-size:14px}input:hover,select:hover,textarea:hover{border-color:#002b7f}textarea{height:120px;resize:none}.full{grid-column:1/-1}.submit-btn{margin-top:20px;background:var(--blue);color:#fff;border:none;padding:14px 25px;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer}.submit-btn:hover{background:#0040ba}</style></head><body><div class='bg-shape shape1'></div><div class='bg-shape shape2'></div><div class='bg-shape shape3'></div><div class='container'><div class='header-section'><div><h1>Travel Request Portal</h1><p class='subtitle'>Submit employee travel requests for approval and booking.</p></div><div class='request-id'>Request ID : TRV-2026-001</div></div><div class='form-grid'><div class='field'><label>Employee Name *</label><input type='text' required></div><div class='field'><label>Employee ID *</label><input type='text' required></div><div class='field'><label>Location *</label><select required><option>Select Location</option></select></div><div class='field'><label>Department *</label><input type='text' required></div><div class='field'><label>Cost Center *</label><select required><option>Select Cost Center</option></select></div><div class='field'><label>Reporting Manager *</label><input type='text' required></div><div class='field'><label>Customer Name *</label><input type='text' required></div><div class='field'><label>Reporting Customer Number *</label><input type='text' required></div><div class='field'><label>Travel Type *</label><select required><option>Flight</option><option>Train</option><option>Cab</option></select></div><div class='field'><label>From Location *</label><input type='text' required></div><div class='field'><label>To Location *</label><input type='text' required></div><div class='field'><label>Departure Date *</label><input type='date' required></div><div class='field'><label>Return Date *</label><input type='date' required></div><div class='field'><label>Estimated Travel Cost (₹) *</label><input type='number' required></div><div class='field'><label>Travel Advance Required *</label><select required><option>Yes</option><option>No</option></select></div><div class='field'><label>Advance Amount (₹) *</label><input type='number'></div><div class='field full'><label>Business Purpose / Travel Justification *</label><textarea required></textarea></div><div class='field full'><label>Upload Approval Document *</label><input type='file' required></div></div><button class='submit-btn'>Submit For Approval</button></div></body></html>
