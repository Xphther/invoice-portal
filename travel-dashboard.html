<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Travel Dashboard</title>

<style>

body{
font-family:'Segoe UI',sans-serif;
padding:30px;
min-height:100vh;

background:
radial-gradient(circle at 10% 20%, rgba(0,43,127,.08), transparent 25%),
radial-gradient(circle at 90% 10%, rgba(0,43,127,.06), transparent 25%),
linear-gradient(135deg,#eef5ff,#f8fbff);
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:30px;
background:rgba(255,255,255,.8);
padding:20px 25px;
border-radius:20px;
backdrop-filter:blur(10px);
box-shadow:0 10px 30px rgba(0,43,127,.08);
}

h1{
color:#002b7f;
}

.new-btn{
background:#002b7f;
color:white;
padding:12px 22px;
border-radius:12px;
text-decoration:none;
font-weight:600;
transition:.3s;
}

.new-btn:hover{
transform:translateY(-2px);
box-shadow:0 10px 20px rgba(0,43,127,.2);
}
  
table{
width:100%;
border-collapse:collapse;
background:rgba(255,255,255,.9);
backdrop-filter:blur(12px);
box-shadow:0 15px 40px rgba(0,43,127,.08);
border-radius:20px;
overflow:hidden;
}

th{
background:#002b7f;
color:white;
padding:18px;
text-align:left;
font-size:14px;
}

td{
padding:18px;
border-bottom:1px solid #edf1f7;
}

.pending{
color:#ff9800;
font-weight:bold;
}
tr:hover{
background:#f5f9ff;
transition:.3s;
}
.no-data{
text-align:center;
padding:30px;
}

</style>

</head>
<body>

<div class="header">

<h1>Travel Requests Dashboard</h1>

<a href="travel-request.html" class="new-btn">
+ New Request
</a>

</div>

<table>
  
<thead>
<tr>
<th>Request No</th>
<th>Employee</th>
<th>From</th>
<th>To</th>
<th>Travel Type</th>
<th>Status</th>
<th>Pending With</th>
<th>Action</th>
</tr>
</thead>

<tbody id="requestTable">

</tbody>

</table>

<script>

const table =
document.getElementById("requestTable");

const requests =
JSON.parse(localStorage.getItem("travelRequests")) || [];

if(requests.length === 0){

table.innerHTML = `
<tr>
<td colspan="8" class="no-data">
No Travel Requests Found
</td>
</tr>
`;

}else{

requests.forEach((req,index) => {

table.innerHTML += `
<tr>
<td>${req.requestId}</td>
<td>${req.employeeName}</td>
<td>${req.fromLocation}</td>
<td>${req.toLocation}</td>
<td>${req.travelType}</td>
<td class="pending">${req.status}</td>
<td>${req.pendingWith || "-"}</td>
<td>
<button onclick="approveRequest(${index})">
Manager Approve
</button>
<button onclick="mdApprove(${index})">
MD Approve
</button>
</td>
</tr>
`;

});

}

function approveRequest(index){

const requests =
JSON.parse(localStorage.getItem("travelRequests")) || [];

if(requests[index].pendingWith === "Reporting Manager"){

requests[index].pendingWith = "Admin Team";

}else{

requests[index].status = "Approved";
requests[index].pendingWith = "Completed";

}

localStorage.setItem(
"travelRequests",
JSON.stringify(requests)
);

location.reload();

}
function mdApprove(index){

const requests =
JSON.parse(localStorage.getItem("travelRequests")) || [];

requests[index].pendingWith = "Admin Team";

localStorage.setItem(
"travelRequests",
JSON.stringify(requests)
);

location.reload();

}
</script>  
  
</body>
</html>
