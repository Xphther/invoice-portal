<!DOCTYPE html>
<html>
<head>
<title>Invoice Management</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:#f4f6f9;
padding:25px;
}

.container{
display:grid;
grid-template-columns:1fr 1fr;
gap:25px;
}

.card{
background:white;
padding:25px;
border-radius:12px;
box-shadow:0 2px 8px rgba(0,0,0,.08);
margin-bottom:20px;
}

h1{
margin-bottom:25px;
color:#002b7f;
}

h2{
margin-bottom:20px;
color:#002b7f;
}

label{
display:block;
font-size:13px;
margin-bottom:6px;
font-weight:600;
color:#555;
}

input,
select{
width:100%;
padding:12px;
border:1px solid #dcdcdc;
border-radius:8px;
margin-bottom:15px;
}

.two-column{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
}

.upload-box{
height:500px;
border:2px dashed #cfd8e3;
border-radius:12px;
background:#f8fafc;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
color:#666;
font-size:20px;
font-weight:600;
}

.upload-btn{
background:#002b7f;
color:white;
padding:12px 20px;
border:none;
border-radius:8px;
cursor:pointer;
}

.workflow-step{
padding:12px;
border:1px solid #e5e7eb;
border-radius:8px;
margin-bottom:10px;
background:#f9fafb;
}

table{
width:100%;
border-collapse:collapse;
margin-top:15px;
}

th{
background:#eef3ff;
padding:12px;
text-align:left;
}

td{
padding:12px;
border-bottom:1px solid #ddd;
}

.add-btn{
background:#002b7f;
color:white;
padding:10px 20px;
border:none;
border-radius:8px;
cursor:pointer;
margin-top:15px;
}

.submit-btn{
background:#002b7f;
color:white;
padding:14px 25px;
border:none;
border-radius:8px;
font-size:16px;
font-weight:600;
cursor:pointer;
margin-top:20px;
}

.status{
background:#fff3cd;
color:#856404;
padding:8px 12px;
border-radius:20px;
display:inline-block;
margin-top:15px;
font-size:13px;
font-weight:600;
}

</style>
</head>

<body>

<h1>Invoice Management</h1>

<div class="container">

<!-- LEFT SIDE -->

<div>

<div class="card">

<h2>Attachments</h2>

<input type="file">

</div>

<div class="card">

<h2>Vendor</h2>

<label>Search Vendor</label>
<input type="text" placeholder="Search vendor from vendor directory">

<label>Select Service</label>
<select>
<option>Select</option>
<option>Transport</option>
<option>Hotel</option>
<option>Courier</option>
</select>

</div>

<div class="card">

<h2>Billing To</h2>

<div class="two-column">

<div>
<label>Select Branch</label>
<input type="text" placeholder="Branch Name">
</div>

<div>
<label>Invoice Number</label>
<input type="text" placeholder="Invoice Number">
</div>

<div>
<label>Invoice Creation Date</label>
<input type="date">
</div>

<div>
<label>Due Date</label>
<input type="date">
</div>

</div>

<label>Select Currency</label>

<select>
<option>INR</option>
<option>USD</option>
</select>

</div>

<div class="card">

<h2>Amount</h2>

<div class="two-column">

<div>
<label>Base Amount</label>
<input type="number">
</div>

<div>
<label>State GST Amount</label>
<input type="number">
</div>

<div>
<label>CGST Amount</label>
<input type="number">
</div>

<div>
<label>IGST Amount</label>
<input type="number">
</div>

<div>
<label>Discount Amount</label>
<input type="number">
</div>

<div>
<label>Round Off Amount</label>
<input type="number">
</div>

</div>

<label>Total Amount</label>
<input type="number">

</div>

<div class="card">

<h2>Cost Allocation</h2>

<table>

<tr>
<th>Location</th>
<th>Percentage</th>
<th>Amount</th>
</tr>

<tr>
<td>Mumbai</td>
<td>100%</td>
<td>₹0</td>
</tr>

</table>

<button class="add-btn">
Add Allocation
</button>

</div>

<button class="submit-btn">
Submit Invoice
</button>

</div>

<!-- RIGHT SIDE -->

<div>

<div class="card">

<div class="upload-box">

<div>

<div style="margin-bottom:15px;">
Upload Invoice PDF
</div>

<input type="file">

</div>

</div>

<div class="status">
OCR Processing - Coming Soon
</div>

</div>

<div class="card">

<h2>Approval Workflow</h2>

<div class="workflow-step">
Submitted
</div>

<div class="workflow-step">
Finance Review
</div>

<div class="workflow-step">
Accounts Approval
</div>

<div class="workflow-step">
Payment Processing
</div>

</div>

</div>

</div>

</body>
</html>
