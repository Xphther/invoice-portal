<!DOCTYPE html>
<html>
<head>

<style>

.page-layout{
display:grid;
grid-template-columns:2fr 1fr;
gap:25px;
align-items:start;
}

.ocr-panel{
display:flex;
flex-direction:column;
gap:20px;
}

.scan-card,
.workflow-card{
background:white;
padding:25px;
border-radius:12px;
box-shadow:0 2px 10px rgba(0,0,0,.08);
text-align:center;
}

.workflow-card p{
padding:12px 0;
border-bottom:1px solid #eee;
}

.ocr-status{
background:#fff3cd;
color:#856404;
padding:10px;
border-radius:20px;
font-weight:600;
display:inline-block;
margin-top:15px;
}

body{
font-family:'Segoe UI',sans-serif;
background:#f4f6f9;
padding:40px;
}

.invoice-form{
background:white;
padding:30px;
border-radius:12px;
box-shadow:0 2px 10px rgba(0,0,0,.08);
width:100%;
}

h1{
margin-bottom:30px;
}

h2{
margin-top:30px;
margin-bottom:15px;
color:#002b7f;
}

input,select{
width:100%;
padding:12px;
border:1px solid #ddd;
border-radius:8px;
}

button{
background:#002b7f;
color:white;
padding:12px 25px;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:600;
}

</style>

</head>
<body>

<h1>Invoice Management</h1>

<div class="page-layout">

    <!-- LEFT SIDE FORM -->

    <div class="invoice-form">

        <h2>Vendor Details</h2>

        <label>Vendor Name</label><br>
        <input type="text" placeholder="Enter Vendor Name">

        <br><br>

        <label>Service Type</label><br>
        <select>
            <option>Select Service</option>
            <option>Transport</option>
            <option>Hotel</option>
            <option>Courier</option>
        </select>

        <br><br>

        <h2>Invoice Details</h2>

        <label>Invoice Number</label><br>
        <input type="text" placeholder="Invoice Number">

        <br><br>

        <label>Invoice Date</label><br>
        <input type="date">

        <br><br>

        <label>Due Date</label><br>
        <input type="date">

        <br><br>

        <label>Branch</label><br>
        <input type="text" placeholder="Branch Name">

        <br><br>

        <label>Currency</label><br>
        <select>
            <option>INR</option>
            <option>USD</option>
        </select>

        <br><br>

        <h2>Amount Details</h2>

        <label>Base Amount</label><br>
        <input type="number" placeholder="Base Amount">

        <br><br>

        <label>CGST</label><br>
        <input type="number" placeholder="CGST">

        <br><br>

        <label>SGST</label><br>
        <input type="number" placeholder="SGST">

        <br><br>

        <label>IGST</label><br>
        <input type="number" placeholder="IGST">

        <br><br>

        <label>Total Amount</label><br>
        <input type="number" placeholder="Total Amount">

        <br><br>

        <button>Submit Invoice</button>

    </div>

    <!-- RIGHT SIDE PANEL -->

    <div class="ocr-panel">

        <div class="scan-card">

            <div style="font-size:80px;">👁️</div>

            <h2>Scanning Invoice</h2>

            <p>
                OCR engine will automatically read invoice data
                after upload.
            </p>

            <div class="ocr-status">
                Coming Soon
            </div>

        </div>

        <div class="workflow-card">

            <h2>Approval Workflow</h2>

            <p>✅ Submitted</p>
            <p>🟡 Finance Review</p>
            <p>⚪ Accounts Approval</p>
            <p>⚪ Payment Processing</p>

        </div>

    </div>

</div>

</body>
</html>
