<!DOCTYPE html>
<html>
<head>
<title>Invoice Management</title>
<style>
body{
font-family:Segoe UI;
background:#f4f6f9;
padding:30px;
}

.container{
background:white;
padding:30px;
border-radius:12px;
box-shadow:0 2px 8px rgba(0,0,0,.08);
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th,td{
padding:12px;
border-bottom:1px solid #ddd;
text-align:left;
}

button{
background:#002b7f;
color:white;
border:none;
padding:10px 20px;
border-radius:6px;
cursor:pointer;
}
</style>
</head>

<body>

<div class="container">

<h1>Invoice Management</h1>

<button>Upload Invoice</button>

<table>
<tr>
<th>Invoice No</th>
<th>Vendor</th>
<th>Amount</th>
<th>Status</th>
</tr>

<tr>
<td>INV-001</td>
<td>ABC Supplies</td>
<td>₹25,000</td>
<td>Pending</td>
</tr>

</table>

</div>

</body>
</html>
