<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Travel Request Portal</title>

<style>

:root{
--red:#ef2b2d;
--blue:#002b7f;
--light:#f4f7fc;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
min-height:100vh;
padding:30px;
overflow-x:hidden;
background:
radial-gradient(circle at 10% 20%, rgba(239,43,45,.08), transparent 25%),
radial-gradient(circle at 90% 10%, rgba(0,43,127,.10), transparent 25%),
linear-gradient(135deg,#eef4ff,#ffffff);
position:relative;
}

body::before{
content:'';
position:fixed;
width:500px;
height:500px;
background:rgba(0,43,127,.05);
border-radius:50%;
top:-200px;
right:-150px;
filter:blur(80px);
animation:float1 10s ease-in-out infinite;
z-index:-1;
}

body::after{
content:'';
position:fixed;
width:450px;
height:450px;
background:rgba(239,43,45,.05);
border-radius:50%;
bottom:-180px;
left:-150px;
filter:blur(80px);
animation:float2 12s ease-in-out infinite;
z-index:-1;
}

@keyframes float1{
0%,100%{transform:translateY(0);}
50%{transform:translateY(40px);}
}

@keyframes float2{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-40px);}
}

.container{
max-width:1400px;
margin:auto;
}

.top-bar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:25px;
}

.back-btn{
background:#fff;
padding:12px 20px;
border-radius:12px;
text-decoration:none;
color:#002b7f;
font-weight:600;
box-shadow:0 5px 15px rgba(0,0,0,.08);
}

.request-id{
background:#002b7f;
color:#fff;
padding:12px 20px;
border-radius:12px;
font-weight:600;
}

.header-card{
background:white;
padding:30px;
border-radius:20px;
margin-bottom:25px;
box-shadow:0 15px 40px rgba(0,0,0,.08);
}

.header-card h1{
color:#002b7f;
margin-bottom:8px;
}

.section{
background:white;
padding:25px;
border-radius:20px;
margin-bottom:20px;
box-shadow:0 10px 30px rgba(0,0,0,.06);
}

.section-title{
font-size:18px;
font-weight:700;
color:#002b7f;
margin-bottom:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
}

.field{
display:flex;
flex-direction:column;
}

label{
font-size:13px;
font-weight:600;
margin-bottom:8px;
}

input,
select,
textarea{
padding:12px;
border:1px solid #d9d9d9;
border-radius:10px;
}

textarea{
height:140px;
resize:none;
}

.full{
grid-column:1/-1;
}

.submit-btn{
background:#002b7f;
color:white;
border:none;
padding:15px 30px;
border-radius:12px;
cursor:pointer;
font-size:15px;
font-weight:600;
}

.submit-btn:hover{
transform:translateY(-2px);
}
.section{
transition:all .35s ease;
position:relative;
overflow:hidden;
}

.section:hover{
transform:translateY(-8px);
box-shadow:0 25px 50px rgba(0,43,127,.15);
}

.section::before{
content:'';
position:absolute;
top:0;
left:-100%;
width:100%;
height:100%;
background:linear-gradient(
90deg,
transparent,
rgba(255,255,255,.4),
transparent
);
transition:.8s;
}

.section:hover::before{
left:100%;
}

.back-btn,
.submit-btn{
transition:all .3s ease;
}

.back-btn:hover{
transform:translateY(-3px);
box-shadow:0 10px 25px rgba(0,43,127,.15);
}

.submit-btn:hover{
transform:translateY(-3px) scale(1.02);
box-shadow:0 15px 30px rgba(0,43,127,.25);
}
@media(max-width:900px){

.grid{
grid-template-columns:1fr;
}

.top-bar{
flex-direction:column;
gap:15px;
}

}

</style>
</head>

<body>

<div class="container">

<div class="top-bar">

<a href="travel.html" class="back-btn">
← Travel Dashboard
</a>

<div class="request-id" id="requestId">
TRV-0001
</div>

</div>

<div class="header-card">
<h1>Travel Request Portal</h1>
<p>Create a new corporate travel request for approval and booking.</p>
</div>

<div class="section">

<div class="section-title">
Employee Information
</div>

<div class="grid">

<div class="field">
<label>Employee Name *</label>
<input
type="text"
id="employeeName"
placeholder="Enter Employee Name"
list="employeeList">

<datalist id="employeeList">
<option value="Amit Sharma">
<option value="Rahul Verma">
<option value="Priya Singh">
</datalist>
</div>

<div class="field">
<label>Employee ID *</label>
<input
type="text"
id="employeeId"
readonly>
</div>

<div class="field">
<label>Location *</label>
<input
type="text"
id="location"
readonly>
</div>

<div class="field">
<label>Department *</label>
<input
type="text"
id="department"
readonly>
</div>

<div class="field">
<label>Cost Center *</label>
<input
type="text"
id="costCenter"
readonly>
</div>

<div class="field">
<label>Cost Booking *</label>
<input
type="text"
id="costBooking"
placeholder="Enter Cost Booking">
</div>

<div class="field">
<label>Reporting Manager *</label>
<input
type="text"
id="reportingManager"
readonly>
</div>

<div class="field">
<label>Reporting Director *</label>
<input
type="text"
id="reportingDirector"
readonly>
</div>

</div>

</div>

<div class="section">

<div class="section-title">
Customer Information
</div>

<div class="grid">

<div class="field">
<label>Customer Name *</label>
<input
type="text"
id="customerName"
readonly>
</div>

<div class="field">
<label>Customer Unique Number *</label>
<input
type="text"
id="CustomerUniqueNumber"
readonly>
</div>

</div>

</div>

<div class="section">

<div class="section-title">
Travel Information
</div>

<div class="grid">

<div class="field">
<label>Travel Type *</label>
<select>
<option>Flight</option>
<option>Train</option>
<option>Cab</option>
<option>Bus</option>
</select>
</div>

<div class="field">
<label>From Location *</label>
<input type="text">
</div>

<div class="field">
<label>To Location *</label>
<input type="text">
</div>

<div class="field">
<label>Departure Date *</label>
<input type="date">
</div>

<div class="field">
<label>Return Date *</label>
<input type="date">
</div>

<div class="field">
<label>Estimated Travel Cost</label>
<input type="number">
</div>

</div>

</div>

<div class="section">

<div class="section-title">
Approval & Justification
</div>

<div class="grid">

<div class="field full">
<label>Business Purpose *</label>
<textarea></textarea>
</div>

<div class="field full">
<label>Upload Approval Document *</label>
<input type="file">
</div>

</div>

</div>

<button class="submit-btn">
Submit For Approval
</button>

</div>

<script>

const randomNo =
Math.floor(1000 + Math.random() * 9000);

document.getElementById("requestId")
.innerHTML = "TRV-" + randomNo;

</script>

</body>
</html>
