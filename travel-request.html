<!DOCTYPE html><html lang='en'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1.0'><title>Create Travel Request</title><style>:root{--red:#ef2b2d;--blue:#002b7f}*{margin:0;padding:0;box-sizing:border-box;font-family:Segoe UI,sans-serif}body{padding:30px;background:linear-gradient(135deg,#f8fbff,#eef4ff,#fff)}.container{max-width:1500px;margin:auto;background:rgba(255,255,255,.9);backdrop-filter:blur(15px);padding:35px;border-radius:20px;box-shadow:0 20px 50px rgba(0,0,0,.08)}.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:30px}.request-id{background:#eef4ff;color:#002b7f;padding:10px 18px;border-radius:10px;font-weight:600}.form-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:20px}label{display:block;margin-bottom:8px;font-size:13px;font-weight:600;color:#555}input,select,textarea{width:100%;padding:12px;border:1px solid #d9d9d9;border-radius:10px}textarea{height:120px}.full{grid-column:1/-1}.submit-btn{margin-top:25px;background:var(--blue);color:#fff;border:none;padding:14px 25px;border-radius:10px;font-weight:700;cursor:pointer}</style></head><body><div class='container'><div class='header'><div><h1>Create Travel Request</h1><p>Submit employee travel request for approval and booking</p></div><div class='request-id'>TRV-AUTO-GENERATED</div></div><div class='form-grid'><div><label>Employee Name *</label><input required></div><div><label>Employee ID *</label><input required></div><div><label>Location *</label><input required></div><div><label>Department *</label><input required></div><div><label>Cost Center *</label><input required></div><div><label>Reporting Manager *</label><input required></div><div><label>Customer Name *</label><input required></div><div><label>Customer Unique Number *</label><input required></div><div><label>Travel Type *</label><select><option>Flight</option><option>Train</option><option>Cab</option></select></div><div><label>From Location *</label><input required></div><div><label>To Location *</label><input required></div><div><label>Mode Preference *</label><select><option>Economy</option><option>Premium Economy</option><option>Business</option></select></div><div><label>Departure Date *</label><input type='date'></div><div><label>Return Date *</label><input type='date'></div><div><label>Estimated Travel Cost *</label><input type='number'></div><div><label>Travel Advance Required *</label><select><option>Yes</option><option>No</option></select></div><div><label>Advance Amount *</label><input type='number'></div><div class='full'><label>Business Purpose / Justification *</label><textarea></textarea></div><div class='full'><label>Upload Approval Document *</label><input type='file'></div></div><button class='submit-btn'>Submit For Approval</button></div></body></html>
