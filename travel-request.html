<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Travel Request Portal</title>

<style>

:root{
--red:#ef2b2d;
--blue:#002b7f;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
min-height:100vh;
padding:40px;
background:
radial-gradient(circle at top left,rgba(239,43,45,.12),transparent 30%),
radial-gradient(circle at top right,rgba(0,43,127,.12),transparent 30%),
linear-gradient(135deg,#f8fbff,#ffffff);
}

.container{
max-width:1400px;
margin:auto;
background:rgba(255,255,255,.88);
backdrop-filter:blur(15px);
padding:35px;
border-radius:20px;
box-shadow:0 20px 50px rgba(0,0,0,.08);
}

.header-section{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:30px;
}

.request-id{
background:#eef4ff;
color:#002b7f;
padding:10px 18px;
border-radius:10px;
font-weight:600;
}

h1{
color:#002b7f;
margin-bottom:10px;
}

.subtitle{
color:#666;
}

.form-grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
margin-top:30px;
}

.field{
display:flex;
flex-direction:column;
}

label{
font-size:13px;
font-weight:600;
margin-bottom:8px;
color:#555;
}

input,
select,
textarea{
padding:12px;
border:1px solid #d9d9d9;
border-radius:10px;
font-size:14px;
}

textarea{
height:120px;
resize:none;
}

.full{
grid-column:1/-1;
}

.submit-btn{
margin-top:30px;
background:#002b7f;
color:white;
border:none;
padding:14px 25px;
border-radius:10px;
font-size:15px;
font-weight:600;
cursor:pointer;
}

.submit-btn:hover{
background:#0046d5;
transform:translateY(-2px);
}

@media(max-width:1000px){

.form-grid{
grid-template-columns:1fr;
}

.header-section{
flex-direction:column;
align-items:flex-start;
gap:15px;
}

}

</style>
</head>

<body>

<div class="container">

<!-- Header -->
<div class="header-section">

<div>
<h1>Travel Request Portal</h1>
<p class="subtitle">
Submit employee travel requests for approval and booking.
</p>
</div>

<div class="request-id" id="requestId">
TRV-2026-001
</div>

</div>

<!-- FORM START -->
<form enctype="multipart/form-data">

<div class="form-grid">

  <!-- Employee Name -->
  <div class="field">
    <label>Employee Name *</label>
    <input type="text"
placeholder="Enter Employee Name"
required>
  </div>

  <!-- Employee ID -->
  <div class="field">
    <label>Employee ID *</label>
    <input type="text"
placeholder="Enter Employee ID"
required
id="employeeId">
  </div>

  <!-- Location -->
  <div class="field">
    <label>Location *</label>
    <select required id="location">
      <option value="">Select Location</option>
      <option>Mumbai</option>
      <option>Pune</option>
      <option>Delhi</option>
      <option>Bangalore</option>
      <option>Chennai</option>
      <option>Hyderabad</option>
    </select>
  </div>

  <div class="field">
<label>Department *</label>
<input type="text"
placeholder="Enter Department"
required
id="department">
</div>

<div class="field">
<label>Cost Center *</label>
<input type="text" placeholder="CC1001" required>
</div>

<div class="field">
<label>Reporting Manager *</label>
<input type="text"
placeholder="Enter Reporting Manager Name"
required>
</div>

<div class="field">
<label>Customer Name *</label>
<input type="text"
placeholder="Enter Customer Name"
required>
</div>

<div class="field">
<label>Customer Unique Number *</label>
<input type="text" placeholder="CUS-0001" required>
</div>

<div class="field">
<label>Travel Type *</label>
<select required>
<option value="">Select Travel Type</option>
<option>Flight</option>
<option>Train</option>
<option>Cab</option>
<option>Bus</option>
</select>
</div>

<div class="field">
<label>From Location *</label>
<input type="text"
placeholder="Enter Departure Location"
required>
</div>

<div class="field">
<label>To Location *</label>
<input type="text"
placeholder="Enter Destination Location"
required>
</div>

<div class="field">
<label>Departure Date *</label>
<input type="date" required>
</div>

<div class="field">
<label>Return Date *</label>
<input type="date" required>
</div>

<div class="field">
<label>Estimated Travel Cost (₹) *</label>
<input type="number"
min="0"
placeholder="Enter Estimated Cost"
required>
</div>

<div class="field">
<label>Travel Advance Required *</label>
<select id="advanceRequired" required>
<option value="">Select</option>
<option value="Yes">Yes</option>
<option value="No">No</option>
</select>
</div>

<div class="field"
id="advanceAmountField"
style="display:none;">

<label>Advance Amount (₹) *</label>

<input
type="number"
min="0"
placeholder="Enter Advance Amount">

</div>

<div class="field">
<label>Mode Preference *</label>
<select required>
<option value="">Select</option>
<option>Economy</option>
<option>Premium Economy</option>
<option>Business Class</option>
</select>
</div>

<div class="field full">
<label>Business Purpose / Travel Justification *</label>
<textarea
required
placeholder="Enter detailed business justification">
</textarea>
</div>

<div class="field full">
<label>Upload Approval Document *</label>
<input type="file" required>
</div>

</div>

<button type="submit" class="submit-btn">
Submit For Approval
</button>

</form>

</div>

<script>

document.getElementById("advanceRequired")
.addEventListener("change", function(){

const field =
document.getElementById("advanceAmountField");

field.style.display =
this.value === "Yes"
? "flex"
: "none";

});

const randomNo =
Math.floor(1000 + Math.random() * 9000);

document.getElementById("requestId")
.innerHTML = "TRV-" + randomNo;

</script>

</body>
</html>
