<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Travel Request Portal</title>

<style>

:root{
--red:#ef2b2d;
--blue:#002b7f;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
min-height:100vh;
padding:40px;
background:
radial-gradient(circle at top left,rgba(239,43,45,.12),transparent 30%),
radial-gradient(circle at top right,rgba(0,43,127,.12),transparent 30%),
linear-gradient(135deg,#f8fbff,#ffffff);
}

.container{
max-width:1400px;
margin:auto;
background:rgba(255,255,255,.88);
backdrop-filter:blur(15px);
padding:35px;
border-radius:20px;
box-shadow:0 20px 50px rgba(0,0,0,.08);
}

.header-section{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:30px;
}

.request-id{
background:#eef4ff;
color:#002b7f;
padding:10px 18px;
border-radius:10px;
font-weight:600;
}

h1{
color:#002b7f;
margin-bottom:10px;
}

.subtitle{
color:#666;
}

.form-grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
margin-top:30px;
}

.field{
display:flex;
flex-direction:column;
}

label{
font-size:13px;
font-weight:600;
margin-bottom:8px;
color:#555;
}

input,
select,
textarea{
padding:12px;
border:1px solid #d9d9d9;
border-radius:10px;
font-size:14px;
}

textarea{
height:120px;
resize:none;
}

.full{
grid-column:1/-1;
}

.submit-btn{
margin-top:30px;
background:#002b7f;
color:white;
border:none;
padding:14px 25px;
border-radius:10px;
font-size:15px;
font-weight:600;
cursor:pointer;
}

.submit-btn:hover{
background:#0046d5;
transform:translateY(-2px);
}

@media(max-width:1000px){

.form-grid{
grid-template-columns:1fr;
}

.header-section{
flex-direction:column;
align-items:flex-start;
gap:15px;
}

}

</style>
</head>

<body>

<div class="container">

<!-- Header -->
<div class="header-section">

<div>
<h1>Travel Request Portal</h1>
<p class="subtitle">
Submit employee travel requests for approval and booking.
</p>
</div>

<div class="request-id">
TRV-2026-001
</div>

</div>

<!-- FORM START -->
<form>

PASTE YOUR FORM-GRID HERE

<button type="submit" class="submit-btn">
Submit For Approval
</button>

</form>

</div>

</body>
</html>
